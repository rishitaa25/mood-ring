<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronic Mood Ring</title>
 <style>
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #121212;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    .ring {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 30%, rgba(255, 255, 255, 0) 70%);
        box-shadow: 0 0 20px 10px var(--glow-color, rgba(0, 255, 255, 0.5)); /* Use dynamic glow color */
        transition: box-shadow 1s ease; /* Smooth transition */
        position: relative;
        z-index: 1;
    }

    .mood-options {
        position: relative;
        z-index: 2;
    }

    #input {
        position: relative;
        z-index: 1;
        margin-top: 20px;
    }

    .intro {
        margin-top: 20px;
        max-width: 600px;
    }

    .mood-options {
        margin-top: 30px;
    }
</style>
</head>
<body>
    <h1>Electronic Mood Ring</h1>
   
    <div class="ring"></div>
    
    <div id="input" style="margin-top: 10px; font-weight: bold;"></div>

    <div id="mood-display" style="margin-top: 10px; font-weight: bold;"></div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="script.js"></script>

    <div class="intro">
        <p>Welcome to the Electronic Mood Ring project! This project uses an Arduino board, a temperature sensor, and LED lights to display different moods based on your body temperature.</p>
    </div>
    <div class="mood-options">
        <h2>Mood Options</h2>
        <p>Different colors represent different moods. Stay tuned for more details....!</p>
    </div>
</body>
</html>
